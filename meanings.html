<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Meanings</title>
    <style>
        body { font-family: "Times New Roman", Times, serif; max-width: 600px; margin: 80px auto; line-height: 1.8; text-align: center; }
        .box { padding: 40px; border: 1px solid #000080; box-shadow: 8px 8px 0px rgba(0, 0, 128, 0.05); }
        h1 { color: #000080; margin-bottom: 20px; }
        p { font-size: 1.2em; color: #333; }
        .back { margin-top: 30px; display: block; color: #0000FF; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title">Name</h1>
        <p id="desc">Loading...</p>
        <a href="#" id="backBtn" class="back">← Back</a>
    </div>

    <script>
        const content = {
            en: {
                Haci: "A title reflecting spiritual heritage and respect. Historically, it denotes one who has completed a significant journey or pilgrimage, symbolizing wisdom and life experience.",
                Berkay: "Meaning 'Strong Moon.' It combines 'Berk' (Solid, Strong, or Lightning) and 'Ay' (Moon), representing a resilient light in the darkness.",
                Buz: "The Turkish word for 'Ice.' It signifies clarity, purity, and a solid, unyielding foundation—much like the crystalline structures studied in physics.",
                back: "← Back to Home"
            },
            tr: {
                Haci: "Manevi bir mirası ve saygınlığı temsil eden bir unvandır. Tarihsel olarak, önemli bir yolculuğu tamamlamış, bilgelik ve hayat tecrübesi kazanmış kişileri simgeler.",
                Berkay: "‘Güçlü Ay’ anlamına gelir. ‘Berk’ (Sağlam, Güçlü) ve ‘Ay’ kelimelerinin birleşimiyle, karanlıkta parlayan dayanıklı bir ışığı temsil eder.",
                Buz: "Saflığı, berraklığı ve sarsılmaz bir temeli simgeler. Fizikteki kristal yapılar gibi netlik ve düzeni çağrıştırır.",
                back: "← Ana Sayfaya Dön"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const lang = params.get('lang') || 'en';

        const title = document.getElementById('title');
        const desc = document.getElementById('desc');
        const backBtn = document.getElementById('backBtn');

        if (name && content[lang][name]) {
            title.innerText = name;
            desc.innerText = content[lang][name];
            backBtn.innerText = content[lang].back;
            backBtn.href = lang === 'tr' ? 'index_tr.html' : 'index.html';
        }
    </script>
</body>
</html>
