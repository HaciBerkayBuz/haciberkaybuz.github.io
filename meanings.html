<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Meanings | Hacı Berkay Buz</title>
    <style>
        body { 
            font-family: "Times New Roman", Times, serif; 
            max-width: 700px; 
            margin: 80px auto; 
            text-align: center; 
            border: 1px solid #ccc; 
            padding: 50px; 
            box-shadow: 12px 12px 0px #000080; 
            background-color: #fff;
            line-height: 1.8;
        }
        h1 { color: #000080; text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid #000080; padding-bottom: 15px; }
        p { font-size: 1.2em; color: #333; margin: 30px 0; text-align: justify; }
        .back { color: #0000FF; text-decoration: none; font-weight: bold; font-size: 0.9em; border: 1px solid #0000FF; padding: 10px 20px; transition: 0.3s; display: inline-block; }
        .back:hover { background: #0000FF; color: #fff; }
    </style>
</head>
<body>
    <h1 id="name-display">Name</h1>
    <p id="meaning-display">Loading...</p>
    <a href="index.html" id="back-link" class="back">← RETURN</a>

    <script>
        // Data keys are lowercase to ensure matching works perfectly
        const data = {
            "haci": {
                display: "Hacı",
                en: "Beyond its formal title for a pilgrim, 'Hacı' is a warm and respectful term of address in Turkish culture, often used to signify camaraderie and wisdom. It represents a person who has completed a significant journey, gaining maturity and a broader perspective on life.",
                tr: "Kutsal bir yolculuğu tamamlayanlara verilen unvanın ötesinde 'Hacı', Türk kültüründe dostane, samimi ve saygı dolu bir hitap şekli olarak kullanılır. Hayat yolculuğunda olgunlaşmış, tecrübe kazanmış ve çevresinde bilgelik sembolü haline gelmiş kişileri temsil eder."
            },
            "berkay": {
                display: "Berkay",
                en: "A powerful combination of 'Berk' (strong, solid, or lightning) and 'Ay' (moon). It symbolizes a resilient and unyielding light that shines brightly even in the darkest times. It represents the harmony between energetic power and serene guidance.",
                tr: "‘Berk’ (sağlam, güçlü, şimşek) ve ‘Ay’ kelimelerinin birleşimidir. Sarsılmaz, dayanıklı ve en karanlık zamanlarda bile yol gösteren duru bir ışığı temsil eder. Şimşeğin enerjisi ile ayın dingin rehberliği arasındaki dengeyi simgeler."
            },
            "buz": {
                display: "Buz",
                en: "Symbolizes absolute clarity, purity, and a solid foundation. In the context of physics, it evokes the order and precision of crystalline structures. It represents a personality that is transparent, disciplined, and stable under pressure.",
                tr: "Tam berraklığı, saflığı ve sarsılmaz bir temeli simgeler. Fiziksel bir bağlamda, kristal örgü yapılarının düzenini çağrıştırır. Şeffaf, disiplinli ve dış etkenlere karşı kendi sağlam yapısını koruyan bir karakteri temsil eder."
            }
        };

        const params = new URLSearchParams(window.location.search);
        const rawName = params.get('name');
        const lang = params.get('lang') || 'en';

        // Normalize the name for lookup (lowercase)
        const lookupKey = rawName ? rawName.toLowerCase() : "";

        if (lookupKey && data[lookupKey]) {
            const entry = data[lookupKey];
            document.getElementById('name-display').innerText = entry.display;
            document.getElementById('meaning-display').innerText = entry[lang];
            
            const backLink = document.getElementById('back-link');
            if (lang === 'tr') {
                backLink.innerText = "← ANA SAYFAYA DÖN";
                backLink.href = "index_tr.html";
            } else {
                backLink.innerText = "← BACK TO HOME";
                backLink.href = "index.html";
            }
        } else {
            document.getElementById('name-display').innerText = "Not Found";
            document.getElementById('meaning-display').innerText = "Please return to the home page and click on a name.";
        }
    </script>
</body>
</html>
